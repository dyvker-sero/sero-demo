<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Coach SERO · Tu guía de bienestar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--s1:#111;--s2:#181818;--s3:#222;
  --t1:#f0f0ee;--t2:#a0a09a;--t3:#585854;--t4:#323230;
  --line:rgba(255,255,255,.06);--line2:rgba(255,255,255,.11);
  --g:#1DB954;--gh:#22d45f;--gdim:rgba(29,185,84,.10);--gglow:rgba(29,185,84,.20);
  --violet:#a78bfa;--vdim:rgba(167,139,250,.10);--vglow:rgba(167,139,250,.20);
  --r:14px;--r2:10px;--rp:100px;
  --fb:'Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--fb);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;overflow:hidden}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;position:relative}

/* ── HEADER ── */
#hdr{
  flex-shrink:0;
  background:var(--s1);
  border-bottom:.5px solid var(--line);
  padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-wrap img{width:72px;height:28px;object-fit:contain;mix-blend-mode:screen}
.coach-badge{
  font-size:10px;font-weight:600;letter-spacing:1.5px;
  color:var(--violet);text-transform:uppercase;
  background:var(--vdim);border:.5px solid var(--vglow);
  padding:3px 8px;border-radius:var(--rp);
}
.status-dot{
  width:7px;height:7px;border-radius:50%;background:var(--g);
  animation:beat 2s ease-in-out infinite;
}
@keyframes beat{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}

/* ── CHAT AREA ── */
#chat{
  flex:1;overflow-y:auto;padding:16px 14px;
  display:flex;flex-direction:column;gap:12px;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}
#chat::-webkit-scrollbar{width:3px}
#chat::-webkit-scrollbar-track{background:transparent}
#chat::-webkit-scrollbar-thumb{background:var(--s4);border-radius:3px}

/* ── MESSAGES ── */
.msg{display:flex;gap:8px;max-width:92%;animation:msgIn .3s ease both}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.coach{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}

.avatar{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;margin-top:2px;
}
.avatar.coach-av{background:var(--vdim);border:.5px solid var(--vglow)}
.avatar.user-av{background:var(--gdim);border:.5px solid var(--gglow);font-size:11px;font-weight:600;color:var(--g)}

.bubble{
  padding:11px 14px;border-radius:var(--r);
  font-size:14px;line-height:1.6;
  max-width:100%;
}
.coach .bubble{
  background:var(--s2);border:.5px solid var(--line2);
  color:var(--t1);border-top-left-radius:4px;
}
.user .bubble{
  background:var(--vdim);border:.5px solid var(--vglow);
  color:var(--t1);border-top-right-radius:4px;
}

/* Typing indicator */
.typing-dots{display:flex;gap:4px;padding:4px 2px}
.typing-dots span{
  width:6px;height:6px;border-radius:50%;background:var(--t3);
  animation:dot 1.2s ease-in-out infinite;
}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

/* Practice card */
.practice-card{
  background:var(--s2);border:.5px solid var(--gglow);
  border-radius:var(--r);padding:14px;margin-top:8px;
  text-decoration:none;display:block;
  transition:background .15s,border-color .15s;
}
.practice-card:hover{background:var(--s3);border-color:var(--g)}
.pc-type{font-size:9px;font-weight:600;letter-spacing:1px;color:var(--g);text-transform:uppercase;margin-bottom:4px}
.pc-title{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:3px}
.pc-desc{font-size:12px;color:var(--t2);line-height:1.5}
.pc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.pc-dur{font-size:11px;color:var(--t3)}
.pc-btn{
  background:var(--g);color:#000;border:none;
  border-radius:var(--rp);padding:5px 12px;
  font-size:11px;font-weight:600;cursor:pointer;
  font-family:var(--fb);
}

/* Quick reply chips */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;padding:0 0 4px}
.chip{
  background:var(--s2);border:.5px solid var(--line2);
  border-radius:var(--rp);padding:7px 12px;
  font-size:12px;color:var(--t2);cursor:pointer;
  transition:all .15s;-webkit-tap-highlight-color:transparent;
  font-family:var(--fb);
}
.chip:hover,.chip:active{background:var(--s3);border-color:var(--violet);color:var(--t1)}

/* Mood ring selector */
.mood-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:4px;width:100%}
.mood-btn{
  background:var(--s2);border:.5px solid var(--line2);
  border-radius:var(--r2);padding:10px 6px;
  text-align:center;cursor:pointer;
  transition:all .15s;-webkit-tap-highlight-color:transparent;
  font-family:var(--fb);
}
.mood-btn:hover,.mood-btn:active{border-color:var(--violet);background:var(--s3)}
.mood-emoji{font-size:20px;display:block;margin-bottom:3px}
.mood-label{font-size:10px;color:var(--t3)}

/* Time selector */
.time-chips{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}

/* ── INPUT AREA ── */
#input-area{
  flex-shrink:0;
  background:var(--s1);
  border-top:.5px solid var(--line);
  padding:10px 12px;
  display:flex;align-items:flex-end;gap:8px;
}
#msg-input{
  flex:1;
  background:var(--s2);
  border:.5px solid var(--line2);
  border-radius:var(--r);
  padding:10px 13px;
  font-size:14px;color:var(--t1);
  font-family:var(--fb);
  outline:none;
  resize:none;
  min-height:42px;max-height:100px;
  line-height:1.5;
  transition:border-color .2s;
  -webkit-appearance:none;
}
#msg-input:focus{border-color:var(--violet)}
#msg-input::placeholder{color:var(--t4)}
#send-btn{
  width:40px;height:40px;flex-shrink:0;
  background:var(--violet);border:none;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .15s,transform .1s;
  -webkit-tap-highlight-color:transparent;
}
#send-btn:hover{background:#b99ff8}
#send-btn:active{transform:scale(.93)}
#send-btn:disabled{background:var(--s3);cursor:default}

/* Disclaimer */
#disclaimer{
  flex-shrink:0;
  text-align:center;
  font-size:10px;color:var(--t4);
  padding:4px 12px 8px;
  background:var(--s1);
}

/* New session button */
#new-session-btn{
  background:none;border:.5px solid var(--line2);
  border-radius:var(--rp);padding:5px 10px;
  font-size:10px;color:var(--t3);cursor:pointer;
  font-family:var(--fb);transition:all .15s;
}
#new-session-btn:hover{border-color:var(--t3);color:var(--t2)}
</style>
</head>

// ── SYSTEM PROMPT ─────────────────────────────────────────────
function getSystemPrompt() {
  const contentList = SERO_CONTENT.map(c =>
    `- ID:${c.id} | "${c.title}" | ${c.type} | ${c.duration} | Tags: ${c.tags.join(", ")}`
  ).join("\n");

  return `Eres el Coach SERO, un guía de bienestar mental entrenado en Terapia Cognitiva Conductual (CBT) y Terapia Cognitiva Basada en Mindfulness (MBCT).

PERSONALIDAD: Cálido, directo, sin jerga clínica. Hablas como un amigo muy sabio que entiende la neurociencia. Empático pero concreto — no das vueltas. Usas "tú" informal.

FILOSOFÍA CLAVE:
- Nunca digas "estás ansioso/triste/enojado". Siempre reencuadra: "estás EXPERIMENTANDO ansiedad/tristeza/enojo" — esto es CBT fundamental. Las emociones son fenómenos temporales, no identidades.
- Siempre explica brevemente la biología: qué está pasando en el cuerpo/cerebro (cortisol, amígdala, sistema nervioso simpático, nervio vago, etc.) en lenguaje accesible. Esto reduce el miedo y da sensación de control.
- Normaliza sin minimizar. "Esto es completamente normal y tu cuerpo está haciendo exactamente lo que fue diseñado para hacer."

CONTENIDO SERO DISPONIBLE:
${contentList}

FLUJO DE CONVERSACIÓN (máximo 3 intercambios antes de dar práctica):

INTERCAMBIO 1 — El usuario comparte lo que le pasa:
- Responde con empatía (1 línea)
- Reencuadra la emoción (no "estás X", sino "estás experimentando X")
- Explica la biología brevemente (2-4 líneas, accesible)
- Termina preguntando: "¿Cuánto tiempo tienes ahora para una práctica? ¿5, 10 o 20 minutos?"
- Respuesta: 3-5 párrafos cortos máximo

INTERCAMBIO 2 — El usuario dice cuánto tiempo tiene:
- Recomienda UNA práctica específica
- Si la emoción/situación coincide con tags del contenido SERO, usa ese contenido e incluye en tu respuesta JSON al final: {"action":"recommend","contentId":"ID_AQUI"}
- Si no hay contenido que encaje, genera una práctica breve y concreta (instrucciones paso a paso)
- Presenta la práctica con entusiasmo pero sin exagerar
- Termina diciendo que estarás aquí cuando terminen

INTERCAMBIO 3 — Seguimiento post-práctica:
- Pregunta cómo se sintieron
- Valida cualquier respuesta (funcionó bien, más o menos, no funcionó)
- Da 1 insight CBT/MBCT relacionado con lo que compartieron
- Cierra con algo que puedan llevar al resto del día (1 práctica mental simple)

REGLAS:
- Respuestas cortas y escandeables. Usa saltos de línea generosos.
- No uses asteriscos ni markdown. Solo texto limpio.
- Nunca diagnostiques ni uses términos clínicos pesados
- Nunca sugieras medicamentos o que "busquen ayuda profesional" a menos que haya señales de crisis real
- Si detectas crisis (hablar de hacerse daño, desesperanza profunda), responde con calidez y al final incluye: {"action":"crisis"}
- Cuando recomiendes contenido SERO, incluye al FINAL de tu mensaje (invisible para el usuario): {"action":"recommend","contentId":"ID"}
- Cuando generes una práctica (sin contenido SERO), incluye al final: {"action":"generate","practice":{"title":"TITULO","type":"TIPO","duration":"X min","steps":["paso1","paso2","paso3","paso4","paso5"]}}

Nombre del usuario: ${userName || "no proporcionado aún"}`;
}

// ── UI HELPERS ────────────────────────────────────────────────
const chatEl = document.getElementById("chat");
const inputEl = document.getElementById("msg-input");
const sendBtn = document.getElementById("send-btn");

function scrollToBottom() {
  setTimeout(() => chatEl.scrollTop = chatEl.scrollHeight, 50);
}

function addMessage(role, content, extra = null) {
  const div = document.createElement("div");
  div.className = `msg ${role}`;

  const avatar = document.createElement("div");
  avatar.className = `avatar ${role === "coach" ? "coach-av" : "user-av"}`;
  avatar.textContent = role === "coach" ? "✦" : (userName ? userName[0].toUpperCase() : "U");

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = content.replace(/\n/g, "<br>");

  div.appendChild(avatar);
  div.appendChild(bubble);
  chatEl.appendChild(div);

  if (extra) {
    chatEl.appendChild(extra);
  }

  scrollToBottom();
  return div;
}

function showTyping() {
  const div = document.createElement("div");
  div.className = "msg coach";
  div.id = "typing-indicator";

  const avatar = document.createElement("div");
  avatar.className = "avatar coach-av";
  avatar.textContent = "✦";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;

  div.appendChild(avatar);
  div.appendChild(bubble);
  chatEl.appendChild(div);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById("typing-indicator");
  if (el) el.remove();
}

function addChips(options, onSelect) {
  const wrap = document.createElement("div");
  wrap.className = "chips";
  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "chip";
    btn.textContent = opt;
    btn.onclick = () => {
      wrap.remove();
      onSelect(opt);
    };
    wrap.appendChild(btn);
  });
  chatEl.appendChild(wrap);
  scrollToBottom();
}

function addMoodSelector(onSelect) {
  const moods = [
    {emoji:"😰", label:"Ansioso"},
    {emoji:"😔", label:"Triste"},
    {emoji:"😤", label:"Enojado"},
    {emoji:"😩", label:"Agotado"},
    {emoji:"😟", label:"Preocupado"},
    {emoji:"😶", label:"Bloqueado"},
    {emoji:"🤯", label:"Sobrepasado"},
    {emoji:"😌", label:"Inquieto"},
  ];
  const grid = document.createElement("div");
  grid.className = "mood-grid";
  moods.forEach(m => {
    const btn = document.createElement("button");
    btn.className = "mood-btn";
    btn.innerHTML = `<span class="mood-emoji">${m.emoji}</span><span class="mood-label">${m.label}</span>`;
    btn.onclick = () => {
      grid.remove();
      onSelect(m.label.toLowerCase());
    };
    grid.appendChild(btn);
  });
  chatEl.appendChild(grid);
  scrollToBottom();
}

  card.innerHTML = `

      <button class="pc-btn" onclick="event.preventDefault();window.open('${content.url}','_blank')">Comenzar →</button>
    </div>
  `;
  chatEl.appendChild(card);
  scrollToBottom();

  // After showing practice, set followup timer
  setTimeout(() => {
    addMessage("coach", "Tómate el tiempo que necesites. Cuando termines, cuéntame cómo te sentiste — estoy aquí. 🌿");
    sessionPhase = "followup";
  }, 2000);

  const stepsHTML = practice.steps.map((s, i) =>
    `<div style="display:flex;gap:8px;margin-bottom:8px"><span style="color:var(--violet);font-weight:600;flex-shrink:0">${i+1}.</span><span style="color:var(--t2);font-size:13px;line-height:1.5">${s}</span></div>`
  ).join("");

  const card = document.createElement("div");
  card.className = "practice-card";
  card.style.cursor = "default";
  card.innerHTML = `
    <div class="pc-type">${practice.type}</div>
    <div class="pc-title">${practice.title}</div>
    <div style="font-size:11px;color:var(--t3);margin-bottom:12px">⏱ ${practice.duration}</div>
    ${stepsHTML}
  `;
  chatEl.appendChild(card);
  scrollToBottom();

  setTimeout(() => {
    addMessage("coach", "Tómate el tiempo que necesites. Cuando termines, cuéntame cómo te sentiste — estoy aquí. 🌿");
    sessionPhase = "followup";
  }, 2000);
}

// ── API CALL ──────────────────────────────────────────────────
async function callClaude(userMessage) {
  messages.push({ role: "user", content: userMessage });

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: getSystemPrompt(),
      messages: messages
    })
  });

  const data = await response.json();
  const fullText = data.content?.map(b => b.text || "").join("") || "";

  // Parse action JSON from end of message
  let action = null;
  let displayText = fullText;

  const jsonMatch = fullText.match(/\{[^{}]*"action"[^{}]*\}/);
  if (jsonMatch) {
    try {
      action = JSON.parse(jsonMatch[0]);
      displayText = fullText.replace(jsonMatch[0], "").trim();
    } catch(e) {}
  }

  messages.push({ role: "assistant", content: fullText });
  return { text: displayText, action };
}

// ── SEND MESSAGE ──────────────────────────────────────────────
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;

  inputEl.value = "";
  inputEl.style.height = "auto";
  sendBtn.disabled = true;

  // Extract name from first message if not set
  if (!userName && sessionPhase === "greeting") {
    const nameMatch = text.match(/(?:soy|me llamo|mi nombre es|llámame)\s+([A-ZÁÉÍÓÚa-záéíóúüñ]+)/i);
    if (nameMatch) userName = nameMatch[1];
  }

  addMessage("user", text);
  exchangeCount++;

  isLoading = true;
  showTyping();

  try {
    const { text: reply, action } = await callClaude(text);
    hideTyping();

    if (action?.action === "crisis") {
      addMessage("coach", reply);
      setTimeout(() => {
        addMessage("coach", "Si sientes que estás en una situación de crisis, por favor comunícate con una línea de apoyo. En México: SAPTEL 55 5259-8121, disponible las 24 horas.");
      }, 800);
    } else {
      addMessage("coach", reply);

      if (action?.action === "recommend") {
        const content = SERO_CONTENT.find(c => c.id === action.contentId);
        if (content) {
          setTimeout(() => showPracticeCard(content), 600);
        }
      } else if (action?.action === "generate" && action.practice) {
        setTimeout(() => showGeneratedPractice(action.practice), 600);
      }
    }

    sessionPhase = exchangeCount >= 2 ? "practice" : "exploring";

  } catch(err) {
    hideTyping();
    addMessage("coach", "Hubo un problema de conexión. Por favor intenta de nuevo en un momento.");
  }

  isLoading = false;
  sendBtn.disabled = inputEl.value.trim().length === 0;
}

// ── INPUT HANDLING ────────────────────────────────────────────
inputEl.addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 100) + "px";
  sendBtn.disabled = this.value.trim().length === 0 || isLoading;
});

inputEl.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) sendMessage();
  }
});

// ── INIT GREETING ─────────────────────────────────────────────
function initGreeting() {
  chatEl.innerHTML = "";
  messages = [];
  exchangeCount = 0;
  sessionPhase = "greeting";
  userName = "";

  setTimeout(() => {
    addMessage("coach", "Hola, soy tu Coach SERO.\n\nEstoy aquí para ayudarte a entender lo que está pasando en tu mente y cuerpo, y encontrar una práctica que realmente funcione para este momento.");
  }, 300);

  setTimeout(() => {
    addMessage("coach", "¿Qué está ocupando espacio en tu mente ahora mismo?");
    addMoodSelector((mood) => {
      inputEl.value = `Estoy sintiendo ${mood}`;
      inputEl.dispatchEvent(new Event("input"));
      inputEl.focus();
    });
  }, 1200);
}

function newSession() {
  initGreeting();
}

// ── START ─────────────────────────────────────────────────────
initGreeting();
</script>
